name: Publish Api

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [.github/workflows/cd-api.yml, server/**]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-api
  cancel-in-progress: true

env:
  IMAGE_OWNER: ${{ github.repository_owner }}
  IMAGE_NAME: auto-novel-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: server
          push: true
          provenance: false
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:latest

      - name: Delete old package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          endpoint="/users/${IMAGE_OWNER}/packages/container/${IMAGE_NAME}/versions"
          if ! ids="$(gh api "${endpoint}?per_page=100" --jq 'sort_by(.created_at) | reverse | .[1:][] | .id' 2>/dev/null)"; then
            endpoint="/orgs/${IMAGE_OWNER}/packages/container/${IMAGE_NAME}/versions"
            ids="$(gh api "${endpoint}?per_page=100" --jq 'sort_by(.created_at) | reverse | .[1:][] | .id')"
          fi
          while IFS= read -r id; do
            [ -z "$id" ] && continue
            gh api --method DELETE "${endpoint}/${id}"
          done <<< "$ids"

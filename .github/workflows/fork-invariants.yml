name: Fork Invariants

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selective-feature-sync:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select comparison base
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'pull_request') {
            "BASE_REF=origin/${{ github.base_ref }}" >> $env:GITHUB_ENV
          } else {
            "BASE_REF=HEAD~1" >> $env:GITHUB_ENV
          }

      - name: Check selective feature sync invariants
        shell: pwsh
        run: ./scripts/check-selective-feature-sync.ps1 -BaseRef $env:BASE_REF
